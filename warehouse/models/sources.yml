version: 2

sources:
  - name: raw_osm
    database: riskfabric
    schema: public
    tables:
      - name: raw_residential
        description: "Raw residential nodes from OSM"
      - name: raw_merchants
        description: "Raw merchant nodes from OSM"
      - name: raw_financial
        description: "Raw financial nodes (ATM/Banks) from OSM"

  - name: reference
    database: riskfabric
    schema: public
    tables:
      - name: ref_boundaries_states
        description: "Official India state boundaries from DataMeet"
      - name: ref_boundaries_districts
        description: "Official India district boundaries (Census 2011) from DataMeet"
      - name: ref_boundaries
        description: "Legacy state boundaries from shapefiles"
