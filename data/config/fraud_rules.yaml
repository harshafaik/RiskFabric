    market_share: 0.70 # Was 0.85
    risk_level: 0.7
    user_agents:
      - "GPay/1.1 (Android 11)"
      - "PhonePe/4.2 (iOS 15.4)"
      - "Paytm/10.5 (Android 10)"
      - "BHIM/2.9 (Android 12)"
  mobile_wallets:
    market_share: 0.10
    risk_level: 0.6
    user_agents:
      - "AmazonPay/1.0"
      - "MobiKwik/4.2"
      - "Freecharge/5.1"
  cards:
    market_share: 0.10 # Was 0.05
    risk_level: 0.9
    user_agents:
      - "Chrome/121.0 (Win10)"
      - "Safari/15.4 (macOS)"
