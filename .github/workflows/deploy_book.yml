name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'documentation/**'
      - 'README.md'
      - 'book.toml'
      - '.github/workflows/deploy_book.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir mdbook
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C mdbook
          echo "$(pwd)/mdbook" >> $GITHUB_PATH

      - name: Build mdBook
        run: mdbook build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
