  # Overlap UPI scams with normal grocery/retail spend
  upi_common_amounts: [150, 450, 800, 1200, 2500, 3000, 4500, 5000, 7500, 10000]
  wallet_amounts: [50, 150, 499, 999, 1499, 2000, 2999, 4999, 7999]
  # Keep some high value, but add mid-range leakage
  high_value_amounts: [5000, 8500, 12000, 25000, 35000, 50000, 75000]
  round_amounts: [100, 200, 500, 1000, 2000, 5000, 10000, 20000, 50000]
  velocity_test_amounts: [1.01, 1.23, 2.05, 1.00, 5.00, 10.00, 25.00, 50.00]
  cnp_common_amounts: [49.99, 99.99, 149.50, 299.99, 499.00, 19.99, 29.99]

