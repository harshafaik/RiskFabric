# Financial Heuristics
financials:
  base_spend:
    Metro: 35000
    Urban: 22000
    Semi-Urban: 15000
    Rural: 9000
  credit_score:
    base: 650
    age_weight: 1.5
    min: 300
    max: 900

# Registration and Metadata
registration:
  lookback_years: 5
  default_location_type: "Urban"

# Scale and Volume Controls
control:
  customer_count: 5000
  transactions_per_customer:
    min: 10
    max: 50
  parallelism:
    customer_gen_threads: 8
    transaction_gen_threads: 16
